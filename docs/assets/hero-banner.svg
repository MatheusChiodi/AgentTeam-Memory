<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 340" width="1200" height="340" role="img" aria-label="AgentTeam-Memory — persistent, per-project memory for Claude Code agent teams. 56 commands, zero dependencies, 420 tests, one Obsidian vault.">
  <title>AgentTeam-Memory — persistent memory for Claude Code agent teams</title>
  <desc>Dark terminal-style banner. A glowing emblem of four agent nodes orbiting a memory core, the wordmark "AgentTeam-Memory", a typed CLI command, stat chips, and an animated knowledge graph feeding an Obsidian vault.</desc>
  <defs>
    <linearGradient id="gRed" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff8a8a"/>
      <stop offset="1" stop-color="#ff5555"/>
    </linearGradient>
    <linearGradient id="gRedV" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff5555"/>
      <stop offset="1" stop-color="#d63d3d"/>
    </linearGradient>
    <linearGradient id="gTitle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbfdff"/>
      <stop offset="1" stop-color="#c9d4df"/>
    </linearGradient>
    <linearGradient id="gWord" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffb3b3"/>
      <stop offset="0.5" stop-color="#ff5555"/>
      <stop offset="1" stop-color="#d63d3d"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"   stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="1"   stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="gAccent" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="600" y2="0" spreadMethod="reflect">
      <stop offset="0"    stop-color="#d63d3d"/>
      <stop offset="0.5"  stop-color="#ff8a8a"/>
      <stop offset="1"    stop-color="#d63d3d"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="0 0" to="1200 0" dur="6s" repeatCount="indefinite"/>
    </linearGradient>
    <radialGradient id="gGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#3a1518" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#0b0f17" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gFade" cx="0.5" cy="0.5" r="0.62">
      <stop offset="0"    stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="0.65" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="1"    stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gEmblem" cx="0.5" cy="0.4" r="0.7">
      <stop offset="0" stop-color="#241019"/>
      <stop offset="1" stop-color="#0c111b"/>
    </radialGradient>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#141c28" stroke-width="1"/>
    </pattern>
    <mask id="gridMask">
      <rect width="1200" height="340" fill="url(#gFade)"/>
    </mask>
    <filter id="soft" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="typeClip">
      <rect x="146" y="202" width="0" height="44">
        <animate attributeName="width" values="0;0;468;468;468" keyTimes="0;0.08;0.62;0.94;1" dur="5.5s" begin="0.4s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
    <clipPath id="ttlClip">
      <text x="124" y="128" font-family="ui-monospace,'Cascadia Code','JetBrains Mono','SF Mono',Consolas,monospace" font-weight="800" font-size="50">AgentTeam-Memory</text>
    </clipPath>
    <style>
      .ttl   { font-family: ui-monospace,'Cascadia Code','JetBrains Mono','SF Mono',Consolas,monospace; font-weight: 800; letter-spacing:-0.5px; }
      .mono  { font-family: ui-monospace,'Cascadia Code','JetBrains Mono','SF Mono',Consolas,monospace; }
      .sans  { font-family: ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,sans-serif; }
      .rise  { animation: rise .9s cubic-bezier(.2,.7,.2,1) both; }
      .d1{animation-delay:.05s} .d2{animation-delay:.30s} .d3{animation-delay:.55s} .d4{animation-delay:.85s} .d5{animation-delay:1.05s}
      .blink { animation: blink 1.05s steps(1) infinite; }
      .node  { transform-box: fill-box; transform-origin: center; animation: pulse 3.2s ease-in-out infinite; }
      .edge  { stroke: #ff5555; stroke-opacity:.35; fill:none; stroke-width:1.4; stroke-dasharray: 2 7; animation: flow 1.6s linear infinite; }
      .glowv { animation: glow 2.8s ease-in-out infinite; transform-box: fill-box; transform-origin:center; }
      .draw  { animation: draw 1.1s ease-out .5s both; }
      .spin  { transform-box: fill-box; transform-origin:center; animation: spin 18s linear infinite; }
      .emn   { transform-box: fill-box; transform-origin:center; animation: epulse 2.6s ease-in-out infinite; }
      .float { animation: float 7s ease-in-out infinite; }
      @keyframes rise  { from{opacity:0; transform:translateY(12px)} to{opacity:1; transform:translateY(0)} }
      @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
      @keyframes pulse { 0%,100%{transform:scale(1); opacity:.8} 50%{transform:scale(1.4); opacity:1} }
      @keyframes flow  { to{stroke-dashoffset:-90} }
      @keyframes glow  { 0%,100%{opacity:.28} 50%{opacity:.8} }
      @keyframes draw  { from{width:0} to{width:300px} }
      @keyframes spin  { to{transform:rotate(360deg)} }
      @keyframes epulse{ 0%,100%{transform:scale(1); opacity:.85} 50%{transform:scale(1.35); opacity:1} }
      @keyframes float { 0%,100%{transform:translateY(0); opacity:.5} 50%{transform:translateY(-9px); opacity:1} }
      @media (prefers-reduced-motion: reduce){
        *{animation:none !important}
        #typeClip rect{width:468px}
      }
    </style>
  </defs>

  <!-- backdrop -->
  <rect width="1200" height="340" fill="#0b0f17"/>
  <rect width="1200" height="340" fill="url(#grid)" opacity="0.7" mask="url(#gridMask)"/>
  <ellipse cx="1000" cy="172" rx="320" ry="220" fill="url(#gGlow)"/>
  <ellipse cx="150" cy="120" rx="260" ry="180" fill="url(#gGlow)" opacity="0.5"/>
  <rect x="0" y="0" width="1200" height="3" fill="url(#gAccent)"/>

  <!-- floating particles -->
  <g fill="#ff5555">
    <circle class="float" cx="540" cy="70"  r="1.6" style="animation-delay:0s"   opacity="0.5"/>
    <circle class="float" cx="660" cy="300" r="1.3" style="animation-delay:1.2s" opacity="0.5"/>
    <circle class="float" cx="345" cy="250" r="1.4" style="animation-delay:2.1s" opacity="0.4"/>
    <circle class="float" cx="720" cy="120" r="1.7" style="animation-delay:.6s"  opacity="0.5"/>
    <circle class="float" cx="430" cy="40"  r="1.2" style="animation-delay:3s"   opacity="0.4"/>
    <circle class="float" cx="1130" cy="60" r="1.5" style="animation-delay:1.7s" opacity="0.5"/>
  </g>

  <!-- window chrome -->
  <g class="rise d1">
    <circle cx="78" cy="44" r="6" fill="#ff5555"/>
    <circle cx="98" cy="44" r="6" fill="#ffbd2e"/>
    <circle cx="118" cy="44" r="6" fill="#27c93f"/>
    <text x="140" y="49" class="mono" font-size="13" fill="#6e7681">~/projects — memory-team</text>
  </g>

  <!-- brand emblem: agents orbiting a memory core -->
  <g class="rise d1">
    <ellipse cx="84" cy="110" rx="40" ry="40" fill="#ff5555" filter="url(#soft)" opacity="0.18" class="glowv"/>
    <rect x="56" y="82" width="56" height="56" rx="15" fill="url(#gEmblem)" stroke="url(#gRedV)" stroke-width="1.6"/>
    <g class="spin" opacity="0.85">
      <line x1="84" y1="110" x2="68" y2="96"  stroke="#ff5555" stroke-opacity=".55" stroke-width="1.3"/>
      <line x1="84" y1="110" x2="100" y2="96" stroke="#ff5555" stroke-opacity=".55" stroke-width="1.3"/>
      <line x1="84" y1="110" x2="68" y2="124" stroke="#ff5555" stroke-opacity=".55" stroke-width="1.3"/>
      <line x1="84" y1="110" x2="100" y2="124" stroke="#ff5555" stroke-opacity=".55" stroke-width="1.3"/>
      <circle cx="68"  cy="96"  r="3.4" fill="#ff8a8a"/>
      <circle cx="100" cy="96"  r="3.4" fill="#ff5555"/>
      <circle cx="68"  cy="124" r="3.4" fill="#ffb3b3"/>
      <circle cx="100" cy="124" r="3.4" fill="#d63d3d"/>
    </g>
    <circle class="emn" cx="84" cy="110" r="6" fill="#ff5555" filter="url(#glow)"/>
  </g>

  <!-- title / wordmark -->
  <g class="rise d1">
    <text x="124" y="128" class="ttl" font-size="50" fill="url(#gTitle)">AgentTeam<tspan fill="url(#gWord)">-Memory</tspan><tspan class="blink" fill="#ff5555" dx="6">▌</tspan></text>
    <g clip-path="url(#ttlClip)">
      <rect x="60" y="90" width="130" height="50" fill="url(#shine)">
        <animate attributeName="x" values="40;40;620;620" keyTimes="0;0.18;0.6;1" dur="5.5s" begin="1.2s" repeatCount="indefinite"/>
      </rect>
    </g>
    <rect x="126" y="144" height="4" rx="2" fill="url(#gRed)" class="draw"/>
  </g>

  <!-- tagline -->
  <text x="124" y="182" class="sans rise d2" font-size="18" fill="#8b949e">Persistent, per-project memory for Claude Code <tspan fill="#c9d1d9" font-style="italic">agent teams</tspan>, backed by an Obsidian vault.</text>

  <!-- terminal command line (typed) -->
  <g class="rise d3">
    <rect x="124" y="202" width="512" height="44" rx="10" fill="#0e1622" stroke="#1e2a3a"/>
    <rect x="124" y="202" width="512" height="44" rx="10" fill="none" stroke="#ff5555" stroke-opacity="0.12"/>
    <g clip-path="url(#typeClip)">
      <text x="146" y="230" class="mono" font-size="16"><tspan fill="#6e7681">$</tspan><tspan fill="#8b949e"> node </tspan><tspan fill="#ff8a8a">memory.mjs</tspan><tspan fill="#e6edf3"> save </tspan><tspan fill="#ff5555">decision</tspan><tspan fill="#8b949e"> "ship it"</tspan><tspan fill="#3fb950" dx="6">✓</tspan></text>
    </g>
  </g>

  <!-- stat chips -->
  <g class="rise d4">
    <g>
      <rect x="124" y="272" width="130" height="30" rx="15" fill="#0e1622" stroke="#243042"/>
      <text x="189" y="292" text-anchor="middle" class="mono" font-size="13.5" fill="#8b949e"><tspan fill="#ff5555" font-weight="700">56</tspan> commands</text>
    </g>
    <g>
      <rect x="264" y="272" width="148" height="30" rx="15" fill="#0e1622" stroke="#243042"/>
      <text x="338" y="292" text-anchor="middle" class="mono" font-size="13.5" fill="#8b949e"><tspan fill="#ff8a8a" font-weight="700">0</tspan> dependencies</text>
    </g>
    <g>
      <rect x="422" y="272" width="114" height="30" rx="15" fill="#0e1622" stroke="#243042"/>
      <text x="479" y="292" text-anchor="middle" class="mono" font-size="13.5" fill="#8b949e"><tspan fill="#ffb3b3" font-weight="700">420</tspan> tests</text>
    </g>
    <g>
      <rect x="546" y="272" width="92" height="30" rx="15" fill="#0e1622" stroke="#243042"/>
      <text x="592" y="292" text-anchor="middle" class="mono" font-size="13.5" fill="#8b949e"><tspan fill="#ff5555" font-weight="700">1</tspan> vault</text>
    </g>
  </g>

  <!-- knowledge graph (right) -->
  <g class="rise d3">
    <!-- edges -->
    <path id="e1" class="edge" d="M792,84 Q900,108 1006,158"/>
    <path id="e2" class="edge" d="M748,168 Q872,166 1000,168"/>
    <path id="e3" class="edge" d="M792,252 Q904,224 1006,184"/>
    <path id="e4" class="edge" d="M886,286 Q952,240 1012,196"/>
    <path id="e5" class="edge" d="M904,96 Q962,128 1014,156"/>
    <path class="edge" d="M792,84 L876,182" style="animation-duration:2.1s"/>
    <path class="edge" d="M792,252 L876,182" style="animation-duration:2.4s"/>

    <!-- vault glow + glyph -->
    <ellipse class="glowv" cx="1021" cy="172" rx="74" ry="52" fill="#ff5555" filter="url(#soft)" opacity="0.4"/>
    <g filter="url(#glow)">
      <rect x="978" y="144" width="86" height="20" rx="6" fill="#0e1622" stroke="url(#gRedV)" stroke-width="1.6"/>
      <rect x="978" y="162" width="86" height="20" rx="6" fill="#0e1622" stroke="url(#gRedV)" stroke-width="1.6"/>
      <rect x="978" y="180" width="86" height="20" rx="6" fill="#0e1622" stroke="url(#gRedV)" stroke-width="1.6"/>
      <circle cx="990" cy="154" r="2.4" fill="#ff5555"><animate attributeName="opacity" values="1;.3;1" dur="2s" repeatCount="indefinite"/></circle>
      <circle cx="990" cy="172" r="2.4" fill="#ff8a8a"><animate attributeName="opacity" values="1;.3;1" dur="2s" begin=".4s" repeatCount="indefinite"/></circle>
      <circle cx="990" cy="190" r="2.4" fill="#ffb3b3"><animate attributeName="opacity" values="1;.3;1" dur="2s" begin=".8s" repeatCount="indefinite"/></circle>
    </g>
    <text x="1021" y="222" text-anchor="middle" class="mono" font-size="13" fill="#8b949e">vault</text>
    <text x="1021" y="238" text-anchor="middle" class="mono" font-size="11" fill="#465061">[[wikilinks]]</text>

    <!-- nodes -->
    <circle class="node" cx="792" cy="84"  r="7" fill="#ff5555" style="animation-delay:0s"/>
    <circle class="node" cx="748" cy="168" r="7" fill="#7d8da3" style="animation-delay:.5s"/>
    <circle class="node" cx="792" cy="252" r="7" fill="#ff8a8a" style="animation-delay:1s"/>
    <circle class="node" cx="886" cy="286" r="6" fill="#ffb3b3" style="animation-delay:1.5s"/>
    <circle class="node" cx="904" cy="96"  r="6" fill="#d63d3d" style="animation-delay:.8s"/>
    <circle class="node" cx="876" cy="182" r="8" fill="#ff5555" style="animation-delay:.3s" filter="url(#glow)"/>

    <!-- travelling data dots -->
    <circle r="3.2" fill="#ff5555"><animateMotion dur="3s"   begin="0s"   repeatCount="indefinite"><mpath xlink:href="#e1"/></animateMotion></circle>
    <circle r="3.2" fill="#ff8a8a"><animateMotion dur="2.6s" begin=".6s"  repeatCount="indefinite"><mpath xlink:href="#e2"/></animateMotion></circle>
    <circle r="3.2" fill="#ffb3b3"><animateMotion dur="3.2s" begin="1.1s" repeatCount="indefinite"><mpath xlink:href="#e3"/></animateMotion></circle>
    <circle r="3.2" fill="#ff8a8a"><animateMotion dur="2.8s" begin="1.6s" repeatCount="indefinite"><mpath xlink:href="#e4"/></animateMotion></circle>
    <circle r="3.2" fill="#ff5555"><animateMotion dur="2.4s" begin=".3s"  repeatCount="indefinite"><mpath xlink:href="#e5"/></animateMotion></circle>
  </g>

  <text x="1140" y="324" text-anchor="end" class="mono" font-size="11.5" fill="#465061">created by Matheus Chiodi · MChiodi</text>
</svg>
