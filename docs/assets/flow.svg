<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 880 240" role="img" aria-label="The memory loop: an agent team writes notes to a vault and reads them back before acting, surviving every session.">
  <title>The memory loop — agents WRITE notes to the vault and READ before acting</title>

  <defs>
    <linearGradient id="flow-red" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff8a8a"/>
      <stop offset="1" stop-color="#ff5555"/>
    </linearGradient>
    <linearGradient id="flow-red2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff5555"/>
      <stop offset="1" stop-color="#ffb3b3"/>
    </linearGradient>
    <radialGradient id="flow-vaultGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ff5555" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#ff5555" stop-opacity="0"/>
    </radialGradient>
    <filter id="flow-soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>

    <marker id="flow-arrowWrite" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff5555"/>
    </marker>
    <marker id="flow-arrowRead" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff8a8a"/>
    </marker>

    <style>
      .flow-label { font-family: ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
      .flow-mono  { font-family: ui-monospace, 'Cascadia Code', 'JetBrains Mono', 'SF Mono', Consolas, monospace; }

      /* Base opacity left at 1 so the image is complete even if a viewer ignores
         CSS; the keyframe only replays a one-time fade-in on load. */
      .flow-fade  { animation: flowFade 0.9s ease-out 0.3s both; }
      @keyframes flowFade { from { opacity: 0; } to { opacity: 1; } }

      .flow-glow  { animation: flowPulse 4s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      @keyframes flowPulse {
        0%, 100% { opacity: 0.45; transform: scale(0.94); }
        50%      { opacity: 0.9;  transform: scale(1.06); }
      }

      .flow-dot { transform-box: fill-box; transform-origin: center; }
      .flow-d1 { animation: flowBlink 2.8s ease-in-out infinite; }
      .flow-d2 { animation: flowBlink 2.8s ease-in-out 0.7s infinite; }
      .flow-d3 { animation: flowBlink 2.8s ease-in-out 1.4s infinite; }
      .flow-d4 { animation: flowBlink 2.8s ease-in-out 2.1s infinite; }
      @keyframes flowBlink {
        0%, 100% { opacity: 0.35; }
        50%      { opacity: 1; }
      }

      .flow-arc { stroke-dasharray: 6 10; animation: flowArc 9s linear infinite; }
      @keyframes flowArc { to { stroke-dashoffset: -160; } }

      @media (prefers-reduced-motion: reduce) {
        * { animation: none !important; }
      }
    </style>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="880" height="240" rx="12" fill="#0b0f17"/>

  <!-- subtle outer loop arc: survives every session -->
  <path class="flow-arc" d="M 150 196 C 280 236, 620 236, 740 196"
        fill="none" stroke="#1e2a3a" stroke-width="1.5"/>
  <text class="flow-label flow-fade" x="445" y="230" text-anchor="middle"
        font-size="11" fill="#6e7681">survives every session</text>

  <!-- LEFT: Agent team cluster -->
  <g>
    <rect x="48" y="56" width="248" height="128" rx="12" fill="#0e1622" stroke="#1e2a3a" stroke-width="1.5"/>
    <text class="flow-mono flow-fade" x="172" y="82" text-anchor="middle" font-size="13" fill="#e6edf3">Agent team</text>

    <g class="flow-fade">
      <circle class="flow-dot flow-d1" cx="80"  cy="118" r="6" fill="#ff5555"/>
      <text class="flow-label" x="96" y="122" font-size="11" fill="#8b949e">researcher</text>

      <circle class="flow-dot flow-d2" cx="80"  cy="142" r="6" fill="#ff8a8a"/>
      <text class="flow-label" x="96" y="146" font-size="11" fill="#8b949e">executor</text>

      <circle class="flow-dot flow-d3" cx="200" cy="118" r="6" fill="#7d8da3"/>
      <text class="flow-label" x="216" y="122" font-size="11" fill="#8b949e">reviewer</text>

      <circle class="flow-dot flow-d4" cx="200" cy="142" r="6" fill="#ffb3b3"/>
      <text class="flow-label" x="216" y="146" font-size="11" fill="#8b949e">librarian</text>
    </g>
  </g>

  <!-- RIGHT: Vault glyph -->
  <g>
    <ellipse class="flow-glow" cx="700" cy="120" rx="86" ry="78" fill="url(#flow-vaultGlow)" filter="url(#flow-soft)"/>
    <g class="flow-fade">
      <rect x="652" y="90"  width="96" height="34" rx="8" fill="#0e1622" stroke="#ff5555" stroke-width="1.5"/>
      <rect x="652" y="112" width="96" height="34" rx="8" fill="#0e1622" stroke="#ff5555" stroke-width="1.5"/>
      <rect x="652" y="134" width="96" height="34" rx="8" fill="#0e1622" stroke="#ff8a8a" stroke-width="1.5"/>
      <rect x="664" y="146" width="48" height="3" rx="1.5" fill="#ff5555"/>
      <rect x="664" y="154" width="64" height="3" rx="1.5" fill="#3a1518"/>
    </g>
    <text class="flow-mono flow-fade" x="700" y="200" text-anchor="middle" font-size="13" fill="#e6edf3">vault</text>
  </g>

  <!-- top arrow: Agent to Vault (WRITE) -->
  <path id="flow-write" d="M 300 96 C 430 56, 530 56, 648 100"
        fill="none" stroke="url(#flow-red)" stroke-width="2"
        marker-end="url(#flow-arrowWrite)"/>
  <text class="flow-mono flow-fade" x="474" y="58" text-anchor="middle" font-size="12" fill="#ff5555">WRITE a note</text>

  <!-- bottom arrow: Vault to Agent (READ) -->
  <path id="flow-read" d="M 648 158 C 530 198, 430 198, 300 152"
        fill="none" stroke="url(#flow-red2)" stroke-width="2"
        marker-end="url(#flow-arrowRead)"/>
  <text class="flow-mono flow-fade" x="474" y="190" text-anchor="middle" font-size="12" fill="#ff8a8a">READ before acting</text>

  <!-- data dots travelling along the arrows, opposite directions -->
  <circle r="4" fill="#ff5555" opacity="0">
    <animateMotion dur="3.4s" repeatCount="indefinite" rotate="auto" keyPoints="0;1" keyTimes="0;1" calcMode="linear">
      <mpath xlink:href="#flow-write"/>
    </animateMotion>
    <animate attributeName="opacity" dur="3.4s" repeatCount="indefinite"
             values="0;1;1;0" keyTimes="0;0.12;0.88;1"/>
  </circle>
  <circle r="4" fill="#ff8a8a" opacity="0">
    <animateMotion dur="3.4s" begin="1.7s" repeatCount="indefinite" rotate="auto" keyPoints="0;1" keyTimes="0;1" calcMode="linear">
      <mpath xlink:href="#flow-read"/>
    </animateMotion>
    <animate attributeName="opacity" dur="3.4s" begin="1.7s" repeatCount="indefinite"
             values="0;1;1;0" keyTimes="0;0.12;0.88;1"/>
  </circle>
</svg>
